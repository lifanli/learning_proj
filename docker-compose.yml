version: '3.8'

services:
  api:
    build:
      context: ./shared/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/learning
      - SECRET_KEY=your-secret-key-here
    depends_on:
      - db
      - redis

  worker:
    build:
      context: ./shared/backend
      dockerfile: Dockerfile
    command: python -m celery -A app.worker worker -l info
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/learning
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=learning
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
