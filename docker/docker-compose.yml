services:
  api:
    build: 
      context: ../backend
      dockerfile: ../docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    environment:
      - DATABASE_URL=postgresql://admin:admin@db:5432/knowledge
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_DB_PATH=/data/chroma
    depends_on:
      - db
      - redis
    networks:
      - learning-net

  worker:
    build: 
      context: ../backend
      dockerfile: ../docker/Dockerfile
    command: celery -A app.tasks worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://admin:admin@db:5432/knowledge
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - learning-net

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: knowledge
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - learning-net

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    networks:
      - learning-net

networks:
  learning-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
